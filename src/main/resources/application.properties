# Database Configuration
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:cryptodb;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# JWT Configuration
mp.jwt.verify.publickey.location=classpath:public_key.pem
smallrye.jwt.sign.key.location=classpath:private_key.pem
smallrye.jwt.new-token.lifetime=31536000

# HTTP Configuration
quarkus.http.host=0.0.0.0
quarkus.http.port=9001

# Logging
quarkus.log.level=INFO
quarkus.log.category."org.acme".level=DEBUG
