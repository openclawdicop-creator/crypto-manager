<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Crypto Manager</title>
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
        }
        
        .glass-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            backdrop-filter: blur(5px);
        }
        
        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .glass-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.15);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="w-full max-w-md px-4" x-data="loginForm()">
        <div class="glass-card p-8">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-white mb-2">🚀 Crypto Manager</h1>
                <p class="text-white/80">Faça login para continuar</p>
            </div>
            
            <form @submit.prevent="submit">
                <div class="mb-6">
                    <label class="block text-white mb-2 font-medium">Username</label>
                    <input 
                        type="text" 
                        x-model="username"
                        class="glass-input w-full px-4 py-3 rounded-lg"
                        placeholder="Digite seu username"
                        required
                    >
                </div>
                
                <div class="mb-6">
                    <label class="block text-white mb-2 font-medium">Senha</label>
                    <input 
                        type="password" 
                        x-model="password"
                        class="glass-input w-full px-4 py-3 rounded-lg"
                        placeholder="Digite sua senha"
                        required
                    >
                </div>
                
                <div x-show="error" x-text="errorMessage" class="mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-white text-sm"></div>
                
                <button 
                    type="submit" 
                    class="btn-primary w-full py-3 rounded-lg text-white font-medium"
                    :disabled="loading"
                >
                    <span x-show="!loading">Entrar</span>
                    <span x-show="loading">Entrando...</span>
                </button>
            </form>
        </div>
    </div>
    
    <script>
        function loginForm() {
            return {
                username: '',
                password: '',
                error: false,
                errorMessage: '',
                loading: false,
                
                async submit() {
                    this.loading = true;
                    this.error = false;
                    
                    try {
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                username: this.username,
                                password: this.password
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (data.error) {
                            this.error = true;
                            this.errorMessage = data.message;
                        } else {
                            localStorage.setItem('jwt_token', data.data.token);
                            window.location.href = '/dashboard';
                        }
                    } catch (e) {
                        this.error = true;
                        this.errorMessage = 'Erro ao conectar com o servidor';
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
