{#include layout}
{#title}Exchanges - Crypto Manager{/title}

{#content}
<div class="glass-card p-8" x-data="exchangesPage()">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-white">Exchanges</h2>
        <button @click="abrirModal()" class="btn-primary px-6 py-3 rounded-lg text-white font-medium">
            + Nova Exchange
        </button>
    </div>
    
    <div class="overflow-x-auto">
        <table class="w-full table-glass">
            <thead>
                <tr>
                    <th class="px-4 py-3 text-left">ID</th>
                    <th class="px-4 py-3 text-left">Nome</th>
                    <th class="px-4 py-3 text-left">Tipo</th>
                    <th class="px-4 py-3 text-left">API</th>
                    <th class="px-4 py-3 text-left">URL</th>
                    <th class="px-4 py-3 text-left">Log</th>
                    <th class="px-4 py-3 text-left">Ações</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="exchange in exchanges" :key="exchange.id">
                    <tr>
                        <td class="px-4 py-3" x-text="exchange.id"></td>
                        <td class="px-4 py-3" x-text="exchange.nome"></td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-1 rounded text-xs font-medium"
                                  :class="exchange.tipo === 'CENTRALIZADA' ? 'bg-blue-500/30 text-blue-200' : 'bg-purple-500/30 text-purple-200'"
                                  x-text="exchange.tipo"></span>
                        </td>
                        <td class="px-4 py-3" x-text="exchange.tipoApi"></td>
                        <td class="px-4 py-3 text-sm" x-text="exchange.urlApi"></td>
                        <td class="px-4 py-3">
                            <span x-text="exchange.logHabilitado ? '✅' : '❌'"></span>
                        </td>
                        <td class="px-4 py-3">
                            <div class="flex space-x-2">
                                <button @click="editar(exchange)" class="text-blue-300 hover:text-blue-100">Editar</button>
                                <button @click="excluir(exchange.id)" class="text-red-300 hover:text-red-100">Excluir</button>
                            </div>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>
    
    <!-- Modal -->
    <div x-show="modalAberto" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4" style="display: none;">
        <div class="glass-card p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold text-white mb-4" x-text="editando ? 'Editar Exchange' : 'Nova Exchange'"></h3>
            
            <form @submit.prevent="salvar">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-white mb-2">Nome</label>
                        <input type="text" x-model="form.nome" class="glass-input w-full px-4 py-2 rounded-lg" required>
                    </div>
                    
                    <div>
                        <label class="block text-white mb-2">Tipo</label>
                        <select x-model="form.tipo" class="glass-input w-full px-4 py-2 rounded-lg" required>
                            <option value="CENTRALIZADA">Centralizada</option>
                            <option value="DESCENTRALIZADA">Descentralizada</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-white mb-2">Tipo API</label>
                        <select x-model="form.tipoApi" class="glass-input w-full px-4 py-2 rounded-lg" required>
                            <option value="REST">REST</option>
                            <option value="WEBSOCKET">WebSocket</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-white mb-2">URL API</label>
                        <input type="url" x-model="form.urlApi" class="glass-input w-full px-4 py-2 rounded-lg" required>
                    </div>
                    
                    <div class="md:col-span-2">
                        <label class="block text-white mb-2">Descrição</label>
                        <textarea x-model="form.descricao" class="glass-input w-full px-4 py-2 rounded-lg" rows="3"></textarea>
                    </div>
                    
                    <div>
                        <label class="block text-white mb-2">Token API</label>
                        <input type="text" x-model="form.tokenApi" class="glass-input w-full px-4 py-2 rounded-lg">
                    </div>
                    
                    <div class="flex items-center">
                        <input type="checkbox" x-model="form.logHabilitado" class="mr-2">
                        <label class="text-white">Habilitar Log</label>
                    </div>
                </div>
                
                <div class="flex justify-end space-x-4 mt-6">
                    <button type="button" @click="fecharModal()" class="px-6 py-2 rounded-lg text-white bg-white/20 hover:bg-white/30 transition">Cancelar</button>
                    <button type="submit" class="btn-primary px-6 py-2 rounded-lg text-white font-medium">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function exchangesPage() {
    return {
        exchanges: [],
        modalAberto: false,
        editando: false,
        form: {
            id: null,
            nome: '',
            descricao: '',
            tipo: 'CENTRALIZADA',
            tipoApi: 'REST',
            tokenApi: '',
            urlApi: '',
            logHabilitado: true
        },
        
        async init() {
            await this.carregar();
        },
        
        async carregar() {
            try {
                const token = localStorage.getItem('jwt_token');
                const response = await fetch('/api/exchanges', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                this.exchanges = data.data || [];
            } catch (e) {
                console.error('Erro ao carregar exchanges', e);
            }
        },
        
        abrirModal() {
            this.editando = false;
            this.form = { id: null, nome: '', descricao: '', tipo: 'CENTRALIZADA', tipoApi: 'REST', tokenApi: '', urlApi: '', logHabilitado: true };
            this.modalAberto = true;
        },
        
        fecharModal() {
            this.modalAberto = false;
        },
        
        editar(exchange) {
            this.editando = true;
            this.form = { ...exchange };
            this.modalAberto = true;
        },
        
        async salvar() {
            try {
                const token = localStorage.getItem('jwt_token');
                const url = this.editando ? `/api/exchanges/${this.form.id}` : '/api/exchanges';
                const method = this.editando ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method,
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(this.form)
                });
                
                await this.carregar();
                this.fecharModal();
            } catch (e) {
                console.error('Erro ao salvar exchange', e);
            }
        },
        
        async excluir(id) {
            if (!confirm('Tem certeza que deseja excluir esta exchange?')) return;
            
            try {
                const token = localStorage.getItem('jwt_token');
                await fetch(`/api/exchanges/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                await this.carregar();
            } catch (e) {
                console.error('Erro ao excluir exchange', e);
            }
        }
    }
}

document.addEventListener('alpine:init', () => {
    Alpine.data('exchangesPage', () => exchangesPage());
});
</script>
{/content}
{/include}
