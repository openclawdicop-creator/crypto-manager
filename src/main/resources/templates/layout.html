<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title ?: 'Crypto Manager'}</title>
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
        }
        
        .glass-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            backdrop-filter: blur(5px);
        }
        
        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .glass-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.15);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .table-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .table-glass th {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: 600;
        }
        
        .table-glass td {
            color: rgba(255, 255, 255, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .table-glass tr:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <header class="glass-card p-6 mb-8" x-data="{ isLoggedIn: localStorage.getItem('jwt_token') != null }">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <h1 class="text-3xl font-bold text-white">🚀 Crypto Manager</h1>
                </div>
                <nav class="flex items-center space-x-4">
                    <template x-if="isLoggedIn">
                        <div class="flex space-x-4">
                            <a href="/dashboard" class="text-white hover:text-gray-200 transition">Dashboard</a>
                            <a href="/exchanges" class="text-white hover:text-gray-200 transition">Exchanges</a>
                            <a href="/redes" class="text-white hover:text-gray-200 transition">Redes</a>
                            <a href="/ativos" class="text-white hover:text-gray-200 transition">Ativos</a>
                            <a href="/parametrizacoes" class="text-white hover:text-gray-200 transition">Parametrizações</a>
                            <a href="/historicos" class="text-white hover:text-gray-200 transition">Históricos</a>
                            <button @click="logout()" class="btn-primary px-4 py-2 rounded-lg text-white font-medium">
                                Logout
                            </button>
                        </div>
                    </template>
                </nav>
            </div>
        </header>
        
        <!-- Main Content -->
        <main>
            {#insert /}
        </main>
        
        <!-- Footer -->
        <footer class="glass-card p-6 mt-8 text-center text-white">
            <p>&copy; 2024 Crypto Manager. Todos os direitos reservados.</p>
        </footer>
    </div>
    
    <script>
        function logout() {
            localStorage.removeItem('jwt_token');
            window.location.href = '/login';
        }
        
        function getToken() {
            return localStorage.getItem('jwt_token');
        }
    </script>
</body>
</html>
