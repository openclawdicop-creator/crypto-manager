{#include layout}
{#title}Ativos Financeiros - Crypto Manager{/title}

{#content}
<div class="glass-card p-8" x-data="ativosPage()">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-white">Ativos Financeiros</h2>
        <button @click="abrirModal()" class="btn-primary px-6 py-3 rounded-lg text-white font-medium">
            + Novo Ativo
        </button>
    </div>
    
    <div class="overflow-x-auto">
        <table class="w-full table-glass">
            <thead>
                <tr>
                    <th class="px-4 py-3 text-left">ID</th>
                    <th class="px-4 py-3 text-left">Nome</th>
                    <th class="px-4 py-3 text-left">Símbolo</th>
                    <th class="px-4 py-3 text-left">Ações</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="ativo in ativos" :key="ativo.id">
                    <tr>
                        <td class="px-4 py-3" x-text="ativo.id"></td>
                        <td class="px-4 py-3" x-text="ativo.nome"></td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-1 rounded bg-yellow-500/30 text-yellow-200 text-sm font-medium" x-text="ativo.simbolo"></span>
                        </td>
                        <td class="px-4 py-3">
                            <div class="flex space-x-2">
                                <button @click="editar(ativo)" class="text-blue-300 hover:text-blue-100">Editar</button>
                                <button @click="excluir(ativo.id)" class="text-red-300 hover:text-red-100">Excluir</button>
                            </div>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>
    
    <!-- Modal -->
    <div x-show="modalAberto" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4" style="display: none;">
        <div class="glass-card p-8 max-w-md w-full">
            <h3 class="text-xl font-bold text-white mb-4" x-text="editando ? 'Editar Ativo' : 'Novo Ativo'"></h3>
            
            <form @submit.prevent="salvar">
                <div class="mb-4">
                    <label class="block text-white mb-2">Nome</label>
                    <input type="text" x-model="form.nome" class="glass-input w-full px-4 py-2 rounded-lg" required>
                </div>
                
                <div class="mb-6">
                    <label class="block text-white mb-2">Símbolo</label>
                    <input type="text" x-model="form.simbolo" class="glass-input w-full px-4 py-2 rounded-lg" required>
                </div>
                
                <div class="flex justify-end space-x-4">
                    <button type="button" @click="fecharModal()" class="px-6 py-2 rounded-lg text-white bg-white/20 hover:bg-white/30 transition">Cancelar</button>
                    <button type="submit" class="btn-primary px-6 py-2 rounded-lg text-white font-medium">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function ativosPage() {
    return {
        ativos: [],
        modalAberto: false,
        editando: false,
        form: {
            id: null,
            nome: '',
            simbolo: ''
        },
        
        async init() {
            await this.carregar();
        },
        
        async carregar() {
            try {
                const token = localStorage.getItem('jwt_token');
                const response = await fetch('/api/ativos', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                this.ativos = data.data || [];
            } catch (e) {
                console.error('Erro ao carregar ativos', e);
            }
        },
        
        abrirModal() {
            this.editando = false;
            this.form = { id: null, nome: '', simbolo: '' };
            this.modalAberto = true;
        },
        
        fecharModal() {
            this.modalAberto = false;
        },
        
        editar(ativo) {
            this.editando = true;
            this.form = { ...ativo };
            this.modalAberto = true;
        },
        
        async salvar() {
            try {
                const token = localStorage.getItem('jwt_token');
                const url = this.editando ? `/api/ativos/${this.form.id}` : '/api/ativos';
                const method = this.editando ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method,
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(this.form)
                });
                
                await this.carregar();
                this.fecharModal();
            } catch (e) {
                console.error('Erro ao salvar ativo', e);
            }
        },
        
        async excluir(id) {
            if (!confirm('Tem certeza que deseja excluir este ativo?')) return;
            
            try {
                const token = localStorage.getItem('jwt_token');
                await fetch(`/api/ativos/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                await this.carregar();
            } catch (e) {
                console.error('Erro ao excluir ativo', e);
            }
        }
    }
}

document.addEventListener('alpine:init', () => {
    Alpine.data('ativosPage', () => ativosPage());
});
</script>
{/content}
{/include}
